<script>
    var headcount = 1382;
    var token = null;
    var intervalId;
    var timeoutId;
    var sessionId;

    const pwdInput = document.getElementById('password');
    const eyeOpen = document.querySelector('.eye-open');
    const eyeClosed = document.querySelector('.eye-closed');

    // 点击切换
    function togglePassword() {
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            eyeOpen.style.display = 'none';
            eyeClosed.style.display = 'block';
        } else {
            pwdInput.type = 'password';
            eyeClosed.style.display = 'none';
            eyeOpen.style.display = 'block';
        }
    }

    eyeOpen.addEventListener('click', togglePassword);
    eyeClosed.addEventListener('click', togglePassword);

    $(function(){
        $('.trans').hide()
        wxQrCode()
        var date = new Date()
        var year = date.getFullYear();
        $(".footer").append("<p style=\"margin-bottom: 10px;\">主办单位： 省委依法治省办   省委组织部   省委宣传部   司法厅   人力资源社会保障厅   省国资委</p>\n" +
                "            2019-"+year+" © 四川普法 <a href=\"http://beian.miit.gov.cn\" target=\"_blank\" rel=\"nofollow\" style=\"color: white\">粤ICP备19080270号-1</a>")
        $('a.signa1').click(function(){
            $('div.wxImg').show();
        })
        $("a.imageHide").click(function(){
            // $('div.wxImg').hide();
            clearInterval(intervalId)
            clearTimeout(timeoutId)
            $('div.wxImg').hide();
            $(".trans").show()
            $("#qrImage").empty();
        })

        $(".captcha").click(function(){
            $(this).attr("src","/study/captcha?"+new Date().getTime())
        });

        if(headcount && headcount > 300000){
            $(".sign").hide();
            $("#headcount").show();
        }

        // 测试 bootstrap 模态框居中
        // var modal = $('.modal');
        // modal.on('shown.bs.modal', function () {
        //     var that = $(this);
        //     var modalDialog = that.find('.modal-dialog');
        //     // 关键代码，如没将modal设置为 block，则 modala_dialog.height() 为零
        //     that.css('display', 'block');
        //     modalDialog.css({'margin-top': Math.max(0, ($(window).height() - modalDialog.height()) / 2) });
        // })

        $('#modalBtn').onclick = function () {
            $('#myModal').modal('show')
        }

        $('#yes').click(function () {
            console.log(yesOk())
            if (yesOk()) {
                $('#myModal').modal('hide')
                Http.Login.$('#loginForm').start();return false;
            } else {
                $('#tip').text('*勾选后确定即可登录')
                return
            }
        })

        $('button[name=submit]').click(function () {
            if (isNull($('input[name=mobile]').val())) {
                $('.tip').text('手机号不能为空');
                return;
            }
            if (isNull($('input[name=password]').val())) {
                $('.tip').text('密码不能为空');
                return;
            }
            if (isNull($('input[name=captcha]').val())) {
                $('.tip').text('验证码不能为空');
                return;
            }
            $('#modalBtn').click();
        })

        $(".trans").click(function () {
            $(this).hide()
            wxQrCode()
        })

        $("#qrImage").click(function () {
            console.log("refresh")
            clearInterval(intervalId);
            clearTimeout(timeoutId)
            $(this).empty();
            wxQrCode()
        })
    })
    function ValidateNumber(e, pnumber) {
        if (!/^\d+$/.test(pnumber)) {
            $(e).val(/^\d+/.exec($(e).val()));
        }
        return false;
    }

    const yesOk = function () {
        if($('#know').prop('checked')) {
            return true;
        } else {
            return false;
        }
    }

    function isNull(val){
        return typeof val == "undefined" || typeof val == "null" || typeof val == "NaN" || val == "";
    }

    function wxQrCode() {
        jQuery.get("/study/wxQrCode", function (data) {
            sessionId = (data.substring(0, data.indexOf("token")))
            Base64ToImage(data.substring(data.indexOf("token") + 5, data.length), function(img) {
                document.getElementById('qrImage').appendChild(img);
                const qrDescDiv = document.getElementById('qrDesc')
                if (qrDescDiv) {
                    qrDescDiv.textContent = "使用微信扫一扫登录";
                } else {
                    // 1. 创建 div 元素
                    const qrDescDiv = document.createElement("div");
                    qrDescDiv.id = "qrDesc";
                    qrDescDiv.textContent = "使用微信扫一扫登录";
                    const qrImage = document.getElementById("qrImage");
                    qrImage.appendChild(qrDescDiv);
                }
                $('div.wxImg').show();
                intervalId = setInterval("polling()", 5000)
                timeoutId = setTimeout(clearIv, 1000 * 60 * 2)
            })
        })
    }

    function clearIv() {
        console.log("clearIntervalId")
        clearInterval(intervalId)
    }

    function Base64ToImage(base64img, callback) {
        var img = new Image();
        img.onload = function() {
            callback(img);
        };
        img.src = base64img;
        img.alt = "刷新二维码"
    }

    function polling() {
        jQuery.get("/study/polling?sessionId="+sessionId, "", function(data) {
            console.log(data)
            if (data.includes("已扫码")) {
                const qrDescDiv = document.getElementById('qrDesc')
                if (qrDescDiv) {
                    qrDescDiv.textContent = "扫码成功，请在手机上登录平台以绑定微信";
                } else {
                    // 1. 创建 div 元素
                    const qrDescDiv = document.createElement("div");
                    qrDescDiv.id = "qrDesc";
                    qrDescDiv.textContent = "扫码成功，请在手机上登录平台以绑定微信";
                    const qrImage = document.getElementById("qrImage");
                    qrImage.appendChild(qrDescDiv);
                }
            }
            if (data == "true") {
                clearInterval(intervalId)
                clearTimeout(timeoutId)
                window.location.href = "/study/index"
            }
        })
    }
</script>
